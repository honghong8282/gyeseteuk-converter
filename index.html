<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과세특 → 자유학기 통지표 변환기</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --paper:#EEF1F6;
    --card:#FFFFFF;
    --ink:#232B3D;
    --ink-soft:#5B6478;
    --ink-faint:#8A93A6;
    --line: rgba(35,43,61,0.12);
    --line-strong: rgba(35,43,61,0.22);
    --stamp:#B33A3A;
    --stamp-soft:#F6E4E2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    padding: 40px 20px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  header{
    text-align:center;
    margin-bottom:36px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color: var(--stamp);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:30px;
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }
  header p{
    color:var(--ink-soft);
    font-size:14.5px;
    margin:0;
    line-height:1.6;
  }

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:24px;
    align-items:stretch;
  }
  @media (max-width:820px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--card);
    border-radius:14px;
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:460px;
    position:relative;
    overflow:hidden;
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    border-bottom:1px solid var(--line);
  }
  .panel-title{
    font-size:13px;
    font-weight:700;
    letter-spacing:0.02em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel-title .dot{
    width:7px;height:7px;border-radius:50%;
  }
  .dot.left{background:var(--ink-faint);}
  .dot.right{background:var(--stamp);}
  .charcount{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--ink-faint);
  }

  textarea{
    flex:1;
    border:none;
    outline:none;
    resize:none;
    padding:18px 20px;
    font-family:'Noto Sans KR', sans-serif;
    font-size:14.5px;
    line-height:1.85;
    color:var(--ink);
    background:
      repeating-linear-gradient(
        var(--card),
        var(--card) 31px,
        var(--line) 32px
      );
    background-attachment:local;
  }
  textarea::placeholder{color:var(--ink-faint);}

  .output-body{
    flex:1;
    padding:18px 20px;
    font-size:14.5px;
    line-height:1.85;
    overflow-y:auto;
    white-space:pre-wrap;
  }
  .output-empty{
    color:var(--ink-faint);
    font-size:13.5px;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
    text-align:center;
    padding:20px;
    line-height:1.7;
  }

  .stamp-mark{
    position:absolute;
    top:16px; right:20px;
    width:56px; height:56px;
    border:2.5px solid var(--stamp);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:12px;
    color:var(--stamp);
    transform:scale(0) rotate(-18deg);
    opacity:0;
    transition:transform .45s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
    background:var(--stamp-soft);
    line-height:1.25;
    text-align:center;
    pointer-events:none;
  }
  .stamp-mark.show{transform:scale(1) rotate(-12deg); opacity:1;}

  .actions{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:26px 0 8px;
  }
  button.primary{
    font-family:'Noto Sans KR', sans-serif;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:13px 30px;
    border-radius:10px;
    font-size:14.5px;
    font-weight:500;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
    display:flex;
    align-items:center;
    gap:8px;
  }
  button.primary:hover{background:#374056;}
  button.primary:active{transform:scale(0.98);}
  button.primary:disabled{background:var(--ink-faint); cursor:default;}

  button.ghost{
    font-family:'Noto Sans KR', sans-serif;
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line-strong);
    padding:13px 20px;
    border-radius:10px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
  }
  button.ghost:hover{background:rgba(35,43,61,0.04);}

  .spinner{
    width:14px;height:14px;
    border:2px solid rgba(255,255,255,0.35);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .notice{
    max-width:640px;
    margin:34px auto 0;
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.75;
    text-align:center;
    padding:16px 20px;
    border-top:1px solid var(--line);
  }
  .notice b{color:var(--ink);}

  .toast{
    position:fixed;
    bottom:28px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:11px 20px;
    border-radius:9px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">과세특 · 자유학기 통지표</div>
    <h1>과세특 → 자유학기 통지표 변환기</h1>
    <p>생활기록부 문체(~함. ~임.)를 자유학기 통지표 문체(~합니다. ~입니다.)로 변환하고<br>띄어쓰기·오타를 자동으로 수정합니다.</p>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><span class="dot left"></span>과세특 원문</div>
        <div class="charcount" id="inCount">0자</div>
      </div>
      <textarea id="inputText" placeholder="예) 색채 대비를 활용한 정물화 제작 과정에서 창의적인 구도를 계획하고 완성도 높게 표현함. 모둠 활동에서 재료 준비와 정리를 주도적으로 수행하며 협업 능력을 보임."></textarea>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><span class="dot right"></span>자유학기 통지표</div>
        <div class="charcount" id="outCount">0자</div>
      </div>
      <div class="stamp-mark" id="stamp">변환<br>완료</div>
      <div class="output-body" id="outputBody">
        <div class="output-empty">왼쪽에 과세특 원문을 붙여넣고<br>'변환하기'를 누르면 결과가 여기에 표시됩니다.</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="convertBtn">
      <span id="btnIcon">→</span>
      <span id="btnLabel">변환하기</span>
    </button>
    <button class="ghost" id="copyBtn">복사하기</button>
  </div>

  <div class="notice">
    <b>안내</b> · 처음 사용 시 Puter 무료 계정 로그인 창이 뜹니다. 구글 계정으로 간편 가입 후 무료로 이용하세요. · 학생 이름 등 개인정보는 입력하지 않도록 주의하세요.
  </div>

</div>

<div class="toast" id="toast">복사되었습니다</div>

<script>
const convertBtn = document.getElementById('convertBtn');
const btnLabel = document.getElementById('btnLabel');
const btnIcon = document.getElementById('btnIcon');
const inputText = document.getElementById('inputText');
const outputBody = document.getElementById('outputBody');
const inCount = document.getElementById('inCount');
const outCount = document.getElementById('outCount');
const stamp = document.getElementById('stamp');
const copyBtn = document.getElementById('copyBtn');
const toast = document.getElementById('toast');

let lastOutput = '';

inputText.addEventListener('input', () => {
  inCount.textContent = inputText.value.length + '자';
});

function setLoading(loading){
  convertBtn.disabled = loading;
  if(loading){
    btnIcon.outerHTML = '<span class="spinner" id="btnIcon"></span>';
    btnLabel.textContent = '변환 중...';
  } else {
    document.getElementById('btnIcon').outerHTML = '<span id="btnIcon">→</span>';
    btnLabel.textContent = '변환하기';
  }
}

async function convert(){
  const original = inputText.value.trim();
  if(!original){
    outputBody.innerHTML = '<div class="output-empty">과세특 원문을 먼저 입력해주세요.</div>';
    return;
  }

  setLoading(true);
  stamp.classList.remove('show');
  outputBody.innerHTML = '<div class="output-empty">변환하는 중입니다...</div>';

  const prompt =
    '다음 텍스트는 학교 생활기록부 과세특 문구입니다.\n' +
    '아래 두 가지만 수행하고, 그 외 내용은 절대 바꾸지 마세요.\n\n' +
    '1. 문장 종결어미를 변환: ~함. ~임. ~음. ~됨. ~였음. 등 생활기록부 문체를 ~합니다. ~입니다. ~습니다. ~됩니다. ~였습니다. 형태의 존댓말로 바꿀 것\n' +
    '2. 띄어쓰기 오류와 명백한 오타를 수정할 것\n\n' +
    '변환된 텍스트만 출력하고 설명은 쓰지 마세요.\n\n' +
    '[원문]\n' + original;

  try{
    const response = await puter.ai.chat(prompt, { model: 'claude-sonnet-4-6' });

    let result = '';
    if(typeof response === 'string'){
      result = response.trim();
    } else if(response && response.message){
      const c = response.message.content;
      result = (typeof c === 'string' ? c : (c[0] && c[0].text) || '').trim();
    } else if(response && response.content){
      const c = response.content;
      result = (typeof c === 'string' ? c : (c[0] && c[0].text) || '').trim();
    }

    if(!result){
      outputBody.innerHTML = '<div class="output-empty">변환 결과를 받지 못했습니다. 다시 시도해주세요.</div>';
      setLoading(false);
      return;
    }

    lastOutput = result;
    outputBody.textContent = result;
    outCount.textContent = result.length + '자';
    stamp.classList.add('show');
  }catch(err){
    outputBody.innerHTML = '<div class="output-empty">오류: ' + err.message + '</div>';
  }
  setLoading(false);
}

convertBtn.addEventListener('click', convert);

copyBtn.addEventListener('click', () => {
  if(!lastOutput) return;
  navigator.clipboard.writeText(lastOutput).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  });
});
</script>

</body>
</html>
